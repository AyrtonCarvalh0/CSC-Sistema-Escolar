services:
  postgres:
    image: postgres:16
    container_name: csc-db
    environment:
      POSTGRES_DB: CSC-DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ayrton175
    ports:
      - "5432:5432"
    volumes:
      - csc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  csc_postgres_data:
